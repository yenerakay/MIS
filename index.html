<!DOCTYPE html>
<html>
<head>
  <title>SoGreen MIS</title>
  <meta charset="UTF-8">

  <!-- Tabler CSS -->
  <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet"/>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="layout-fluid">

<div class="page">
  <div class="page-wrapper">
    <div class="container-xl">

      <h1 class="mb-4">🌱 SoGreen MIS Dashboard</h1>

      <!-- KPI CARDS -->
      <div class="row mb-4">

        <div class="col-md-4">
          <div class="card p-3">
            <h3>Total Projects</h3>
            <h2 id="totalProjects">0</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-3">
            <h3>Women Ratio (%)</h3>
            <h2 id="womenRatio">0</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-3">
            <h3>Total Employment</h3>
            <h2 id="totalEmployment">0</h2>
          </div>
        </div>

      </div>

      <!-- FORM -->
      <div class="card p-3 mb-4">
        <h3>➕ Veri Girişi</h3>

        <input id="project" class="form-control mb-2" placeholder="Proje Adı">
        <input id="province" class="form-control mb-2" placeholder="İl">
        <input id="participants" class="form-control mb-2" placeholder="Katılımcı">
        <input id="women" class="form-control mb-2" placeholder="Kadın">
        <input id="employment" class="form-control mb-2" placeholder="İstihdam">

        <button onclick="saveData()" class="btn btn-green">Kaydet</button>
      </div>

      <!-- CHART -->
      <canvas id="chart"></canvas>

      <!-- TABLE -->
      <table class="table mt-4" id="table"></table>

    </div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 SENİN CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB2g5QPuKvuznnfYTwGVLc1Uooo2GmCea8",
  authDomain: "sogreen-mis.firebaseapp.com",
  projectId: "sogreen-mis",
  storageBucket: "sogreen-mis.firebasestorage.app",
  messagingSenderId: "594502704572",
  appId: "1:594502704572:web:17a104a4a041c7dea7dfb9",
  measurementId: "G-44MEBQYSCT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 KAYDET
window.saveData = async function(){

  await addDoc(collection(db, "projects"), {
    project: document.getElementById("project").value,
    province: document.getElementById("province").value,
    participants: Number(document.getElementById("participants").value || 0),
    women: Number(document.getElementById("women").value || 0),
    employment: Number(document.getElementById("employment").value || 0)
  });

  alert("Kaydedildi ✅");
  loadData();
}

// 🔥 LOAD DATA
async function loadData(){

  const querySnapshot = await getDocs(collection(db, "projects"));

  let data = [];

  querySnapshot.forEach(doc => {
    data.push(doc.data());
  });

  renderDashboard(data);
}

// 🔥 DASHBOARD
function renderDashboard(data){

  // KPI
  document.getElementById("totalProjects").innerText = data.length;

  let totalWomen = data.reduce((a,b)=>a + b.women,0);
  let totalParticipants = data.reduce((a,b)=>a + b.participants,0);

  let ratio = totalParticipants ? ((totalWomen/totalParticipants)*100).toFixed(1) : 0;

  document.getElementById("womenRatio").innerText = ratio;

  let totalEmployment = data.reduce((a,b)=>a + b.employment,0);
  document.getElementById("totalEmployment").innerText = totalEmployment;

  // TABLE
  let html = "<tr><th>Project</th><th>Province</th><th>Employment</th></tr>";

  data.forEach(d=>{
    html += `<tr>
      <td>${d.project}</td>
      <td>${d.province}</td>
      <td>${d.employment}</td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;

  // CHART
  new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
      labels: data.map(d=>d.province),
      datasets: [{
        label: 'Employment',
        data: data.map(d=>d.employment)
      }]
    }
  });
}

// INIT
loadData();

</script>

</body>
</html>
